name: Docker
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to Docker Hub?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      force_rebuild:
        description: "Bypass layer cache (full rebuild)"
        required: false
        type: boolean
        default: false
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags:   ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check if project is initialised
        id: project-check
        run: |
          if [ -f "vite.config.ts" ] && [ -f "pnpm-lock.yaml" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ vite.config.ts and pnpm-lock.yaml found — proceeding with production build"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Project not yet initialised (missing vite.config.ts or pnpm-lock.yaml) — skipping build"
            echo "   Scaffold your project first, then run pnpm install."
          fi
      - name: Set up QEMU
        if: steps.project-check.outputs.ready == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.project-check.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        if: steps.project-check.outputs.ready == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        if: steps.project-check.outputs.ready == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
      - name: Build and push
        id: build
        if: steps.project-check.outputs.ready == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: >-
            ${{
              github.event_name != 'workflow_dispatch' ||
              inputs.push_image == 'true'
            }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          no-cache: ${{ inputs.force_rebuild == true }}
          provenance: true
          sbom: true
          build-args: |
            CACHE_BUST=${{ hashFiles('docker/Dockerfile.prod', 'package.json', 'pnpm-lock.yaml') }}
      - name: Write job summary
        if: always() && steps.project-check.outputs.ready == 'true'
        run: |
          echo "## 🐳 Production Image Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | \`linux/amd64, linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by CI run** | \`${{ github.event.workflow_run.html_url }}\` |" >> "$GITHUB_STEP_SUMMARY"