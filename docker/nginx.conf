# ============================================================
#  docker/nginx.conf
#
#  PLACEHOLDER — This file is future-ready.
#  It is used by docker/Dockerfile.prod once your project
#  has been scaffolded and a Vite production build exists.
#
#  What this config does:
#    • Serves the Vite SPA bundle from /usr/share/nginx/html
#    • Routes all unknown paths to index.html (client-side routing)
#    • Sets aggressive cache headers for hashed static assets
#    • Adds standard security response headers
#    • Enables gzip compression for text-based assets
#    • Runs on port 8080 (non-root — cannot bind below 1024)
#
#  TODO: Add a Content-Security-Policy header after scaffolding.
#        CSP is project-specific — a wrong default causes breakage.
#        Start with:
#          add_header Content-Security-Policy
#            "default-src 'self'; script-src 'self' 'unsafe-inline'; ..."
#            always;
#        Then tighten per your app's actual needs.
# ============================================================

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Hashed static assets — cache forever ─────────────────────────────────
    # Vite appends a content hash to all JS/CSS filenames (e.g. main.abc123.js)
    # so it is safe to cache them indefinitely.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback — send all routes to index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached so browsers always fetch the latest
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Disable access to hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
